[RunSvc]
JobName = "gps_RMPS_emstandard_upgrade"
BeamType = "gps"
GpsMacFileName = "gps/gpsCLinac.mac" # gets file from data/ in this repo
PhspEvtVrtxMultiplicityTreshold = 20
PrintProgressFrequency = 0.05
Physics = "LowE_Penelope" #  "LowE_Livermore" "LowE_Penelope" "emstandard_opt3"

GenerateCT = false
PrimariesAnalysis = false
NTupleAnalysis = false
RunAnalysis = true

WriteFieldMaskToCsv = true

StoreTracks= false
StorePositions= false
StoreEnergies = false
StorePrimaries = false
StoreRunInfo= false
MinimalMode= true

[GeoSvc]
BuildLinac = true
BuildPatient = true
MlcModel="Simplified"

[PatientGeometry]
Type = "D3DDetector"
PatientIsocentreX = 0.0
PatientIsocentreY = 0.0
PatientIsocentreZ = 60.5
EnviromentSizeX = 35.0
EnviromentSizeY = 35.0
EnviromentSizeZ = 120.0
EnviromentMedium = "G4_Galactic"

[D3DDetector_Detector]
TranslationInLocalFrame = [0.0,0.0,-60.0] # In mm
Voxelization = [1,1,10] # Number of cels in every direction

[D3DDetector_Cell]
Medium = "RMPS470"
Voxelization = [2,2,2]
TracksAnalysis = true
CellScorer = true
CellVoxelisedScorer = true

[RunSvc_Plan] # paths can be relative (to PROJECT_DATA) or absolute
nControlPoints = 1      # This will limit number of ctrl points defined below!
BeamRotation = 0       # This will overwrite Rotation value for all below plan files!
nParticles = 1000     # This will overwrite Rotation value for all below plan files!
PlanInputFile = [
        "plan/custom/cp5x5.dat"
]
