[GeoSvc]
BuildLinac = true
BuildPatient = true
MlcModel="Simplified"

[PatientGeometry]
Type = "D3DDetector"
PatientIsocentreX = 0.0
PatientIsocentreY = 0.0
PatientIsocentreZ = 25.0
EnviromentSizeX = 80.0
EnviromentSizeY = 80.0
EnviromentSizeZ = 80.0
EnviromentMedium = "G4_Galactic"
SupplementaryGeometry = "dose3d/geo/Tower/Model.stl"
SupplementaryGeometryMaterial = "PMMA"
SupplementaryGeometryPositionX = 0.0
SupplementaryGeometryPositionY = 0.0
SupplementaryGeometryPositionZ = 26.0


[D3DDetector_Detector]
Voxelization = [3,3,3] # Number of cels in every direction



[D3DDetector_Cell]
Medium = "RMPS470" #G4_WATER, PMMA
Voxelization = [5,5,5]
TracksAnalysis = true
PositionsAnalysis = true
EnergiesAnalysis = true
PrimariesAnalysis = true
RunInfoAnalysis = true
MinimalOutput = false


[RunSvc_Plan] # paths can be relative (to PROJECT_DATA) or absolute
nControlPoints = 1      # This will limit number of ctrl points defined below!
BeamRotation = 0        # This will overwrite Rotation value for all below plan files!
nParticles = 5000      # This will overwrite Rotation value for all below plan files!
PlanInputFile = [
        "plan/custom/cp10x10.dat"
